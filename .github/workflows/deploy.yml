name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm config set minimum-release-age 0
          pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/301452644454/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: snow-launcher-admin-gh-ci@snow-launcher.iam.gserviceaccount.com

      - name: Deploy to Firebase Hosting
        run: pnpm exec firebase deploy --only hosting --project snow-launcher
